# Reusable Terraform CI workflow.
# Consumers call this with `uses: <owner>/terraform-pipelines-github/.github/workflows/terraform-validate.yml@<ref>`.
name: terraform-validate (reusable)

on:
  workflow_call:
    inputs:
      working_dir:
        type: string
        default: "."
      terraform_version:
        type: string
        default: ""    # empty -> read .terraform-version, fallback 1.9.5
      run_tflint:
        type: boolean
        default: true
      run_checkov:
        type: boolean
        default: true
      runs_on:
        description: 'JSON-encoded runs-on value. String like ''"ubuntu-latest"'' or array like ''["self-hosted","bbuf-aca"]''.'
        type: string
        default: '"ubuntu-latest"'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    defaults:
      run:
        shell: bash
    env:
      WORKING_DIR: ${{ inputs.working_dir }}
    steps:
      - uses: actions/checkout@v6.0.3

      # ----- Guards: rules these reusable workflows assume. -----
      # See templates/README.md "Rules these templates encode".
      - name: Guard - no 'terraform workspace' step in caller workflows
        shell: bash
        run: |
          set -e
          if [ -d .github/workflows ]; then
            HITS=$(grep -RIn -E '(^|[[:space:]])terraform[[:space:]]+workspace[[:space:]]+(select|new)' .github/workflows/ || true)
            if [ -n "${HITS}" ]; then
              echo "::error::Found 'terraform workspace select|new' in a caller workflow."
              echo "::error::The reusable terraform-cd workflow uses a per-config backend 'key' (one state file per config). Adding a workspace step on top creates orphan workspace blobs that desync from the real state."
              echo "::error::See https://github.com/BRBuffington/terraform-pipelines-github/blob/main/templates/README.md#rules-these-templates-encode"
              echo "${HITS}"
              exit 1
            fi
          fi

      - name: Guard - backend.hcl files set use_azuread_auth and use_oidc
        shell: bash
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -e
          shopt -s globstar nullglob
          FOUND=0
          MISSING=""
          for f in **/*backend*.hcl; do
            FOUND=1
            if ! grep -qE '^[[:space:]]*use_azuread_auth[[:space:]]*=[[:space:]]*true' "$f"; then
              MISSING="${MISSING}${f}: missing 'use_azuread_auth = true'\n"
            fi
            if ! grep -qE '^[[:space:]]*use_oidc[[:space:]]*=[[:space:]]*true' "$f"; then
              MISSING="${MISSING}${f}: missing 'use_oidc = true'\n"
            fi
          done
          if [ "${FOUND}" = "0" ]; then
            echo "No backend.hcl files found under ${WORKING_DIR} -- skipping (CI uses workflow vars, not hcl)."
          elif [ -n "${MISSING}" ]; then
            echo "::error::Backend hcl files missing required AAD/OIDC flags:"
            printf "%b" "${MISSING}"
            exit 1
          fi

      - name: Resolve Terraform version
        id: tfver
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [[ -n "${{ inputs.terraform_version }}" ]]; then
            echo "version=${{ inputs.terraform_version }}" >> "$GITHUB_OUTPUT"
          elif [[ -f .terraform-version ]]; then
            echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"
          else
            echo "version=1.9.5" >> "$GITHUB_OUTPUT"
          fi

      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false

      - name: terraform fmt -check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -backend=false -input=false

      - name: terraform validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate -no-color

      - name: setup tflint
        if: inputs.run_tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
        continue-on-error: true

      - name: tflint
        if: inputs.run_tflint
        working-directory: ${{ env.WORKING_DIR }}
        run: tflint --recursive --format=compact || true

      - name: checkov
        if: inputs.run_checkov
        working-directory: ${{ env.WORKING_DIR }}
        shell: bash
        run: |
          python3 -m pip install --quiet --user checkov
          export PATH="$HOME/.local/bin:$PATH"
          checkov -d . --framework terraform --quiet --soft-fail
        continue-on-error: true
