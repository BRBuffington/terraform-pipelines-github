# Unit-test the OPA/conftest policies in policy/ on every change.
# Pure rego test (opa test) — no Azure, no backend — so it runs on a
# GitHub-hosted runner (this repo is public).
name: policy-test

on:
  pull_request:
    paths:
      - "policy/**"
      - "tests/**"
      - ".github/workflows/terraform-cd.yml"
      - ".github/workflows/policy-test.yml"
  push:
    branches: [main]
    paths:
      - "policy/**"
      - "tests/**"
      - ".github/workflows/terraform-cd.yml"
      - ".github/workflows/policy-test.yml"

permissions:
  contents: read

jobs:
  opa-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2.2.0
        with:
          version: 1.4.2

      - name: opa test policy/
        run: opa test policy/ -v

      - name: workflow contract tests
        run: python3 -m unittest discover -s tests -p "test_*.py" -v

  action-ref-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Create smoke artifact
        run: echo "upload-artifact v7.0.1 resolved" > action-ref-smoke.txt

      - name: Resolve and run upload-artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: action-ref-smoke-${{ github.run_id }}
          path: action-ref-smoke.txt
          retention-days: 1
