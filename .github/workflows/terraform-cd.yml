# Reusable Terraform CD workflow: matrix plan + gated apply.
# Consumers call this with `uses: <owner>/terraform-pipelines-github/.github/workflows/terraform-cd.yml@<ref>`.
#
# Caller must have a GitHub Environment matching `inputs.environment` with these vars:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   TF_BACKEND_RESOURCE_GROUP, TF_BACKEND_STORAGE_ACCOUNT, TF_BACKEND_CONTAINER, TF_BACKEND_KEY_PREFIX
# The caller-side `<environment>-apply` Environment should have required reviewers configured.
name: terraform-cd (reusable)

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: true
      configs:
        description: "JSON array of tfvars basenames in <working_dir>/environments/"
        type: string
        required: true
      plan_only:
        type: boolean
        default: true
      destroy:
        type: boolean
        default: false
      working_dir:
        type: string
        default: "."
      tfvars_dir:
        type: string
        default: "environments"
      terraform_version:
        type: string
        default: ""
      max_parallel_plan:
        type: number
        default: 4
      apply_timeout_minutes:
        type: number
        default: 60
      run_checkov:
        type: boolean
        default: true
      run_opa:
        description: "Run the OPA/conftest policy gate (backend-key convention + no unexpected destroy/recreate). Hard-fails the plan on a deny."
        type: boolean
        default: true
      allow_recreate:
        description: "Override the OPA destroy/recreate guard. Set true ONLY for a reviewed, intentional plan that deletes/replaces resources or is a genuine large first apply."
        type: boolean
        default: false
      runs_on:
        description: 'JSON-encoded runs-on value. String like ''"ubuntu-latest"'' or array like ''["self-hosted","bbuf-aca"]''.'
        type: string
        default: '"ubuntu-latest"'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: plan-${{ matrix.config }}
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    environment: ${{ inputs.environment }}
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.max_parallel_plan) }}
      matrix:
        config: ${{ fromJSON(inputs.configs) }}
    defaults:
      run:
        shell: bash
    env:
      WORKING_DIR: ${{ inputs.working_dir }}
      TFVARS_DIR: ${{ inputs.tfvars_dir }}
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true"
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Validate tfvars file exists
        run: |
          f="${WORKING_DIR}/${TFVARS_DIR}/${{ matrix.config }}.tfvars"
          if [[ ! -f "$f" ]]; then echo "::error::$f not found"; exit 1; fi

      - name: Resolve Terraform version
        id: tfver
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [[ -n "${{ inputs.terraform_version }}" ]]; then
            echo "version=${{ inputs.terraform_version }}" >> "$GITHUB_OUTPUT"
          elif [[ -f .terraform-version ]]; then
            echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"
          else
            echo "version=1.9.5" >> "$GITHUB_OUTPUT"
          fi

      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false

      - name: terraform fmt -check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      # ----- OPA policy gate setup (conftest + this repo's policy/ dir) -----
      # Checkout this pipelines repo to get the policy/ dir. A reusable workflow
      # CANNOT introspect its own repo/ref at runtime: github.workflow_ref /
      # github.workflow_sha and the job.* context all resolve to the CALLER's
      # entry workflow, not this reusable one (and there is no job.workflow_*
      # context — that was the bug that 0-job-failed every caller). So derive the
      # repo from the caller's org (github.repository_owner, which equals the
      # owner that also hosts this reusable for our fleet and for same-org forks)
      # and pin the ref to main. Repo is public, so no token is needed. Both
      # values are controlled (org login + literal), so there is no injection
      # surface in the with: block.
      - name: Setup conftest
        if: ${{ inputs.run_opa }}
        shell: bash
        run: |
          set -euo pipefail
          CONFTEST_VERSION=0.56.0
          curl -sSL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
            | tar -xz -C /tmp conftest
          sudo mv /tmp/conftest /usr/local/bin/conftest
          conftest --version

      - name: Checkout pipeline policies
        if: ${{ inputs.run_opa }}
        uses: actions/checkout@v6.0.3
        with:
          repository: ${{ github.repository_owner }}/terraform-pipelines-github
          ref: main
          path: .tfpipelines
          persist-credentials: false

      - name: Compute backend key
        id: bkey
        env:
          KEY_PREFIX: ${{ vars.TF_BACKEND_KEY_PREFIX }}
          CONFIG: ${{ matrix.config }}
        run: echo "key=${KEY_PREFIX}/${CONFIG}.tfstate" >> "$GITHUB_OUTPUT"

      - name: OPA - backend key convention (pre-plan)
        if: ${{ inputs.run_opa }}
        shell: bash
        env:
          BKEY: ${{ steps.bkey.outputs.key }}
        run: |
          set -euo pipefail
          # Value comes from env (not an inline GitHub expression in the run
          # body) so a caller-controlled config/prefix cannot inject shell. The
          # policy then validates shape; a malformed key (e.g. containing a
          # quote) makes invalid JSON and conftest fails closed.
          printf '{"key": "%s"}' "$BKEY" > /tmp/bkey.json
          conftest test /tmp/bkey.json \
            --policy "${GITHUB_WORKSPACE}/.tfpipelines/policy" \
            --namespace backend_key --no-color

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ steps.bkey.outputs.key }}" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="use_oidc=true"

      # NOTE: No `terraform workspace` step. The backend `key` already gives
      # each config its own state file (`<prefix>/<config>.tfstate`), so
      # workspaces are redundant. A previous version of this workflow ran
      # `terraform workspace select -or-create <config>` which created an
      # orphan workspace at `<key>env:<config>` separate from the real state
      # in workspace `default` — every plan since then proposed full creates
      # against the empty orphan. See bbuf-runners 2026-05-22 incident.

      - name: terraform plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set +e
          DESTROY=""
          if [[ "${{ inputs.destroy }}" == "true" ]]; then DESTROY="-destroy"; fi
          terraform plan -input=false -lock-timeout=10m -detailed-exitcode -no-color \
            -var-file="${TFVARS_DIR}/${{ matrix.config }}.tfvars" \
            -out="${{ matrix.config }}.tfplan" \
            $DESTROY | tee plan.txt
          ec=${PIPESTATUS[0]}
          set -e
          case $ec in
            0) echo "has_changes=false" >> "$GITHUB_OUTPUT" ;;
            2) echo "has_changes=true"  >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::plan failed (exit $ec)"; exit $ec ;;
          esac

      - name: terraform show -json
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform show -json "${{ matrix.config }}.tfplan" > "${{ matrix.config }}.tfplan.json"

      - name: checkov on plan
        if: ${{ inputs.run_checkov && !inputs.destroy }}
        working-directory: ${{ env.WORKING_DIR }}
        shell: bash
        run: |
          python3 -m pip install --quiet --user checkov
          export PATH="$HOME/.local/bin:$PATH"
          checkov -f "${{ matrix.config }}.tfplan.json" --framework terraform_plan --quiet --soft-fail
        continue-on-error: true

      # HARD gate (no continue-on-error): denies a plan that deletes/replaces
      # live resources or mass-creates against empty/wrong state — the
      # corpus-search 2026-06-17 "28 to add, 2 to destroy" signature. Skipped in
      # destroy mode (deletes are intentional). Override with allow_recreate=true
      # for a reviewed, intentional destructive/first-apply plan.
      - name: OPA - no unexpected destroy/recreate (post-plan)
        if: ${{ inputs.run_opa && !inputs.destroy }}
        working-directory: ${{ env.WORKING_DIR }}
        shell: bash
        env:
          CONFIG: ${{ matrix.config }}
          ALLOW_RECREATE: ${{ inputs.allow_recreate }}
          DESTROY_MODE: ${{ inputs.destroy }}
        run: |
          set -euo pipefail
          # allow_recreate / destroy are typed booleans (rendered as true|false).
          # Values via env so nothing is interpolated into the shell.
          printf '{"params": {"allow_recreate": %s, "destroy_mode": %s}}' \
            "$ALLOW_RECREATE" "$DESTROY_MODE" > /tmp/opa-params.json
          conftest test "${CONFIG}.tfplan.json" \
            --policy "${GITHUB_WORKSPACE}/.tfpipelines/policy" \
            --namespace main \
            --data /tmp/opa-params.json --no-color

      - name: upload plan artifact
        if: ${{ !inputs.plan_only }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: tfplan-${{ matrix.config }}
          path: |
            ${{ env.WORKING_DIR }}/${{ matrix.config }}.tfplan
            ${{ env.WORKING_DIR }}/${{ matrix.config }}.tfplan.json
          retention-days: 7

  apply:
    name: apply-${{ matrix.config }}
    needs: plan
    if: ${{ !inputs.plan_only && needs.plan.outputs.has_changes == 'true' }}
    runs-on: ${{ fromJSON(inputs.runs_on) }}
    environment: ${{ inputs.environment }}-apply
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        config: ${{ fromJSON(inputs.configs) }}
    defaults:
      run:
        shell: bash
    env:
      WORKING_DIR: ${{ inputs.working_dir }}
      ARM_USE_OIDC: "true"
      ARM_USE_AZUREAD: "true"
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Resolve Terraform version
        id: tfver
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [[ -n "${{ inputs.terraform_version }}" ]]; then
            echo "version=${{ inputs.terraform_version }}" >> "$GITHUB_OUTPUT"
          elif [[ -f .terraform-version ]]; then
            echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"
          else
            echo "version=1.9.5" >> "$GITHUB_OUTPUT"
          fi

      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false

      - uses: actions/download-artifact@v8.0.1
        with:
          name: tfplan-${{ matrix.config }}
          path: ${{ env.WORKING_DIR }}

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ vars.TF_BACKEND_KEY_PREFIX }}/${{ matrix.config }}.tfstate" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="use_oidc=true"

      # No `terraform workspace` step — see comment in plan job.

      - name: terraform apply
        working-directory: ${{ env.WORKING_DIR }}
        timeout-minutes: ${{ fromJSON(inputs.apply_timeout_minutes) }}
        run: terraform apply -input=false -no-color -auto-approve "${{ matrix.config }}.tfplan"

      - name: terraform output
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform output -no-color || true
